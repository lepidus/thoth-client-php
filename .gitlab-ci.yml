image: php:7.4

cache:
  paths:
    - vendor/

before_script:
  - apt update && apt install git libpq-dev libzip-dev zip -yqq
  - curl -sS https://getcomposer.org/installer | php
  - php composer.phar install --ignore-platform-reqs --optimize-autoloader --no-ansi --no-interaction --no-progress

.lint: &lint
  - vendor/bin/php-cs-fixer fix -v --diff --allow-risky=yes --config=.php-cs-fixer.php

.test: &test
  - vendor/bin/phpunit tests/

.analyse: &analyse
  - vendor/bin/phpstan analyse --debug --memory-limit=1G

lint:php7.4:
  image: php:7.4
  script:
    - *lint

lint:php8.2:
  image: php:8.2
  script:
    - *lint

test:php7.4:
  image: php:7.4
  script:
    - *test

test:php8.0:
  image: php:8.0
  script:
    - *test

test:php8.1:
  image: php:8.1
  script:
    - *test

test:php8.2:
  image: php:8.2
  script:
    - *test

test:php8.3:
  image: php:8.3
  script:
    - *test

analyse:php7.4:
  image: php:7.4
  script:
    - *analyse

analyse:php8.0:
  image: php:8.0
  script:
    - *analyse

analyse:php8.1:
  image: php:8.1
  script:
    - *analyse

analyse:php8.2:
  image: php:8.2
  script:
    - *analyse

analyse:php8.3:
  image: php:8.3
  script:
    - *analyse
